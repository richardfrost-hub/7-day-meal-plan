
<h2 class="sr-only">7-day no carb no sugar meal plan based on your food preferences</h2>
<style>
  .day-tab { padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; font-size: 13px; margin: 3px; }
  .day-tab.active { background: #0F6E56; color: #E1F5EE; border-color: #0F6E56; }
  .meal-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 10px; }
  .meal-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .meal-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .meal-desc { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px; line-height: 1.5; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
  .tag-protein { background: #EEEDFE; color: #3C3489; }
  .tag-spicy { background: #FAECE7; color: #993C1D; }
  .tag-veg { background: #EAF3DE; color: #3B6D11; }
  .tag-chinese { background: #FAEEDA; color: #854F0B; }
  .tag-mexican { background: #FAECE7; color: #993C1D; }
  .macro-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .macro { font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 2px 8px; border-radius: 8px; }
  .section-head { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 16px 0 8px; }
</style>

<div style="padding:1rem 0">
  <p style="font-size:18px; font-weight:500; margin:0 0 4px; color:var(--color-text-primary)">7-day meal plan</p>
  <p style="font-size:13px; color:var(--color-text-secondary); margin:0 0 16px">No carbs · No sugar · No coconut, avocado or cashews</p>

  <div style="display:flex; flex-wrap:wrap; margin-bottom:20px;" id="tabs"></div>
  <div id="plan-content"></div>
</div>

      { label: "Dinner", name: "Beef mince chilli sin frijoles", desc: "Rich beef mince chilli with tomatoes, peppers, chipotle paste, cumin and oregano. No beans. Topped with grated strong Cheddar.", tags: ["mexican","protein","spicy"], macros: ["~45g protein","~8g carbs"] },
      { label: "Snack", name: "Strong Cheddar with celery", desc: "A generous wedge of your favourite hard English cheese with crisp celery sticks.", tags: ["protein"], macros: ["~12g protein","~1g carbs"] },
    ]
  },
  {
    day: "Tue",
    theme: "Chinese-inspired Tuesday",
    meals: [
      { label: "Breakfast", name: "Egg fried cauliflower rice bowl", desc: "Riced cauliflower stir-fried with 2 eggs, soy sauce, sesame oil, spring onions and a pinch of white pepper.", tags: ["chinese","protein","veg"], macros: ["~18g protein","~6g carbs"] },
      { label: "Lunch", name: "Marmite beef strips", desc: "Thin sliced beef stir-fried with Marmite, soy sauce, garlic and ginger. Served on a bed of pak choi.", tags: ["chinese","protein"], macros: ["~38g protein","~4g carbs"] },
      { label: "Dinner", name: "Chinese-style chicken curry", desc: "Chicken thighs in a golden Chinese curry sauce made with turmeric, Chinese five spice, ginger, garlic and chicken stock. No potatoes. Served with stir-fried cabbage.", tags: ["chinese","protein","spicy"], macros: ["~42g protein","~7g carbs"] },
      { label: "Snack", name: "Hard boiled eggs with chilli oil", desc: "Two hard boiled eggs halved and drizzled with chilli oil and a pinch of sea salt.", tags: ["protein","spicy"], macros: ["~12g protein","~0g carbs"] },
    ]
  },
  {
    day: "Wed",
    theme: "Midweek Mexican",
    meals: [
      { label: "Breakfast", name: "Chorizo and egg bake", desc: "Sliced chorizo baked with eggs, roasted tomatoes and peppers in a cast iron pan. Finished with strong Cheddar on top.", tags: ["mexican","protein","spicy"], macros: ["~32g protein","~5g carbs"] },
      { label: "Lunch", name: "Mince stuffed peppers", desc: "Beef mince cooked with cumin, chilli, garlic and tomato paste, stuffed into halved peppers and baked with a strong Cheddar crust.", tags: ["mexican","protein","spicy"], macros: ["~38g protein","~8g carbs"] },
      { label: "Dinner", name: "Spicy chicken thigh tray bake", desc: "Bone-in chicken thighs rubbed with smoked paprika, cayenne, garlic powder and olive oil. Roasted with courgette, peppers and cherry tomatoes.", tags: ["mexican","protein","spicy","veg"], macros: ["~46g protein","~6g carbs"] },
      { label: "Snack", name: "Marmite and cheese omelette roll", desc: "Quick thin omelette spread with Marmite and rolled around a slice of strong Cheddar.", tags: ["protein"], macros: ["~18g protein","~1g carbs"] },
    ]
  },
  {
    day: "Thu",
    theme: "Chinese Thursday",
    meals: [
      { label: "Breakfast", name: "Ginger and soy scrambled eggs", desc: "Eggs scrambled slowly with fresh ginger, a splash of soy sauce and spring onions. Side of cucumber.", tags: ["chinese","protein"], macros: ["~22g protein","~2g carbs"] },
      { label: "Lunch", name: "Spicy minced pork lettuce cups", desc: "Pork mince stir fried with garlic, ginger, chilli bean paste, soy and sesame oil. Served in iceberg lettuce cups.", tags: ["chinese","protein","spicy"], macros: ["~36g protein","~4g carbs"] },
      { label: "Dinner", name: "Kung pao chicken (no rice)", desc: "Diced chicken with dried chillies, Sichuan pepper, garlic, ginger and soy. Served with stir-fried broccoli and green beans.", tags: ["chinese","protein","spicy"], macros: ["~44g protein","~7g carbs"] },
      { label: "Snack", name: "Strong Cheddar and pickled gherkins", desc: "Sharp Cheddar paired with tangy gherkins — a classic, satisfying combination.", tags: ["protein"], macros: ["~10g protein","~1g carbs"] },

  {

    meals: [

      { label: "Lunch", name: "Chilli beef salad bowl", desc: "Sliced rare beef with chilli, lime, coriander, cucumber, radishes and a sesame dressing. No noodles.", tags: ["chinese","protein","spicy"], macros: ["~40g protein","~5g carbs"] },
      { label: "Dinner", name: "Mexican spiced mince with cauliflower rice", desc: "Seasoned beef mince with chipotle, garlic, cumin and tomatoes over riced cauliflower. Topped with soured cream and a mountain of strong Cheddar.", tags: ["mexican","protein","spicy"], macros: ["~48g protein","~8g carbs"] },

      { label: "Lunch", name: "Cheese and Marmite stuffed chicken breast", desc: "Chicken breast butterflied and stuffed with strong Cheddar and Marmite, wrapped in bacon and baked until golden.", tags: ["protein"], macros: ["~52g protein","~1g carbs"] },
      { label: "Dinner", name: "Slow-cooked Chinese beef shin", desc: "Beef shin braised in soy, star anise, ginger, garlic and chilli for several hours. Melting tender. Served with wilted greens.", tags: ["chinese","protein","spicy"], macros: ["~50g protein","~5g carbs"] },
      { label: "Snack", name: "Cheese board selection", desc: "Strong Cheddar, a hard aged cheese of your choice, celery, walnuts and a few olives.", tags: ["protein"], macros: ["~16g protein","~2g carbs"] },
    ]
  },
  {
    day: "Sun",
    theme: "Sunday Reset",
    meals: [
      { label: "Breakfast", name: "Baked eggs in spiced tomato sauce", desc: "Eggs baked into a rich sauce of tomatoes, peppers, cumin and smoked paprika. Topped with crumbled strong Cheddar.", tags: ["spicy","protein","veg"], macros: ["~22g protein","~8g carbs"] },
      { label: "Lunch", name: "Roast chicken thighs with roasted veg", desc: "Skin-on chicken thighs roasted with courgette, aubergine, peppers and red onion. Seasoned with garlic and herbs.", tags: ["protein","veg"], macros: ["~46g protein","~9g carbs"] },
      { label: "Dinner", name: "Spicy mince and egg one-pan bake", desc: "Beef mince cooked with chilli, cumin and tomatoes in a pan, then eggs cracked in and baked on top. Strong Cheddar melted over.", tags: ["mexican","protein","spicy"], macros: ["~44g protein","~6g carbs"] },
      { label: "Snack", name: "Marmite beef jerky style bites", desc: "Thin beef strips marinated in Marmite, soy and black pepper then griddled crispy. Great protein hit.", tags: ["protein"], macros: ["~20g protein","~1g carbs"] },
    ]
  }
];

const tagLabels = { protein:"Protein", spicy:"Spicy", veg:"Veg", chinese:"Chinese", mexican:"Mexican" };
const tagClass = { protein:"tag-protein", spicy:"tag-spicy", veg:"tag-veg", chinese:"tag-chinese", mexican:"tag-mexican" };

let currentDay = 0;

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = plan.map((d,i) => `<button class="day-tab ${i===currentDay?'active':''}" onclick="selectDay(${i})">${d.day}</button>`).join("");
}

function renderPlan() {
  const d = plan[currentDay];
  let html = `<div style="background:#E1F5EE; border-radius:var(--border-radius-md); padding:8px 14px; margin-bottom:14px; font-size:13px; color:#0F6E56; font-weight:500;">${d.theme}</div>`;
  d.meals.forEach(m => {
    const lcolour = m.label==="Breakfast"?"#EEEDFE":m.label==="Lunch"?"#E1F5EE":m.label==="Dinner"?"#FAECE7":"#FAEEDA";
    const ltcolour = m.label==="Breakfast"?"#3C3489":m.label==="Lunch"?"#0F6E56":m.label==="Dinner"?"#993C1D":"#854F0B";
    html += `<div class="meal-card">
      <div class="meal-label" style="background:${lcolour};color:${ltcolour};display:inline-block;padding:2px 8px;border-radius:8px;">${m.label}</div>
      <p class="meal-name">${m.name}</p>
      <p class="meal-desc">${m.desc}</p>
      <div>${m.tags.map(t=>`<span class="tag ${tagClass[t]}">${tagLabels[t]}</span>`).join("")}</div>
      <div class="macro-row">${m.macros.map(mc=>`<span class="macro">${mc}</span>`).join("")}</div>
    </div>`;
  });
  document.getElementById("plan-content").innerHTML = html;
}

function selectDay(i) {
  currentDay = i;
  renderTabs();
  renderPlan();
}

renderTabs();
renderPlan();
</script>
