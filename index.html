<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-Day Meal Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFF9F2;
    --dark: #1C1A17;
    --mid: #4A4540;
    --muted: #8A8078;
    --accent: #C4541A;
    --accent-light: #F5E8DF;
    --green: #2D5A3D;
    --green-light: #E4EFE8;
    --gold: #B8860B;
    --gold-light: #FDF3D0;
    --purple: #4A3566;
    --purple-light: #EDE8F5;
    --border: rgba(28,26,23,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    color: var(--cream);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(196,84,26,0.04) 40px,
      rgba(196,84,26,0.04) 41px
    );
  }

  header .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  header p {
    font-size: 0.9rem;
    color: rgba(250,247,242,0.6);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .tags-row {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  .header-tag {
    background: rgba(196,84,26,0.2);
    color: #F5C4A0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }

  .day-nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: center;
    flex-wrap: wrap;
  }

  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    padding: 0.45rem 1.1rem;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--mid);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .day-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }

  main {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .day-header {
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .day-number {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 0.3rem;
  }

  .day-theme {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--dark);
  }

  .meal-block {
    margin-bottom: 1.25rem;
    background: var(--warm-white);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .meal-block:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(28,26,23,0.08);
  }

  .meal-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .meal-type-pill {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .pill-breakfast { background: var(--purple-light); color: var(--purple); }
  .pill-lunch { background: var(--green-light); color: var(--green); }
  .pill-dinner { background: var(--accent-light); color: var(--accent); }
  .pill-snack { background: var(--gold-light); color: var(--gold); }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--dark);
    flex: 1;
  }

  .meal-body { padding: 0.85rem 1.25rem 1rem; }

  .meal-desc {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--mid);
    font-weight: 300;
    margin-bottom: 0.75rem;
  }

  .meal-footer {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .meal-tag {
    font-size: 0.7rem;
    padding: 2px 9px;
    border-radius: 10px;
    font-weight: 400;
  }

  .tag-spicy { background: #FAECE7; color: #993C1D; }
  .tag-protein { background: #EDE8F5; color: #4A3566; }
  .tag-veg { background: #E4EFE8; color: #2D5A3D; }
  .tag-mexican { background: #FDF3D0; color: #7A5A00; }
  .tag-chinese { background: #FEF0E8; color: #8A3A10; }

  .macro {
    font-size: 0.7rem;
    color: var(--muted);
    background: rgba(28,26,23,0.05);
    padding: 2px 8px;
    border-radius: 8px;
    margin-left: auto;
  }

  .nutrition-bar {
    background: var(--dark);
    color: var(--cream);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-top: 2rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    text-align: center;
  }

  .nutrition-bar .val {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }

  .nutrition-bar .lbl {
    font-size: 0.7rem;
    color: rgba(250,247,242,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .tip-banner {
    background: var(--green-light);
    border-left: 3px solid var(--green);
    border-radius: 0 10px 10px 0;
    padding: 0.85rem 1.1rem;
    margin: 1.5rem 0;
    font-size: 0.85rem;
    color: var(--green);
    line-height: 1.5;
  }

  .tip-banner strong { font-weight: 500; }

  footer {
    background: var(--dark);
    color: rgba(250,247,242,0.4);
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    line-height: 1.7;
  }

  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 500px) {
    .nutrition-bar { grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
    .nutrition-bar .val { font-size: 1.2rem; }
    main { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <p class="subtitle">Richard's Personal Plan</p>
  <h1>7-Day Meal Plan</h1>
  <p>High protein · No carbs · No sugar · Full flavour</p>
  <div class="tags-row">
    <span class="header-tag">No Coconut</span>
    <span class="header-tag">No Avocado</span>
    <span class="header-tag">No Cashews</span>
    <span class="header-tag">Mexican &amp; Chinese inspired</span>
  </div>
</header>

<nav class="day-nav" id="dayNav">
  <button class="day-btn active" onclick="showDay(0,this)">Monday</button>
  <button class="day-btn" onclick="showDay(1,this)">Tuesday</button>
  <button class="day-btn" onclick="showDay(2,this)">Wednesday</button>
  <button class="day-btn" onclick="showDay(3,this)">Thursday</button>
  <button class="day-btn" onclick="showDay(4,this)">Friday</button>
  <button class="day-btn" onclick="showDay(5,this)">Saturday</button>
  <button class="day-btn" onclick="showDay(6,this)">Sunday</button>
</nav>

<main id="mainContent"></main>

<footer>
  <p>Built for Richard &mdash; No carbs, no sugar, full flavour.</p>
  <p style="margin-top:0.4rem;">Always consult your GP before starting a new dietary programme.</p>
</footer>

<script>
const days = [
  {
    day: "Day 1", theme: "Mexican Monday",
    tip: "Hitting 120g+ of protein daily is key to rebuilding muscle strength. Today's plan gets you close to 130g.",
    protein: "~128g", carbs: "~22g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Marmite Scrambled Eggs", desc:"3 eggs scrambled slowly in butter with a generous teaspoon of Marmite stirred through at the end. Served with wilted spinach and a grind of black pepper.", tags:["protein","veg"], macros:"~28g protein · ~3g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Spicy Chicken Lettuce Wraps", desc:"Minced chicken fried with cumin, smoked paprika, chilli flakes, garlic and tomatoes. Served in crisp iceberg lettuce cups with soured cream and grated strong Cheddar on top.", tags:["mexican","protein","spicy"], macros:"~40g protein · ~5g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Beef Mince Chilli Sin Frijoles", desc:"Rich beef mince chilli with tinned tomatoes, peppers, chipotle paste, cumin and dried oregano. No beans. Topped with a mountain of grated strong Cheddar and a dollop of soured cream.", tags:["mexican","protein","spicy"], macros:"~45g protein · ~8g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Strong Cheddar with Celery", desc:"A generous wedge of your favourite hard English cheese alongside crisp celery sticks. Simple, satisfying and full of calcium.", tags:["protein"], macros:"~12g protein · ~1g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 2", theme: "Chinese-Inspired Tuesday",
    tip: "Soy sauce, ginger and sesame oil are your best friends on low-carb Chinese cooking. All the flavour, none of the rice needed.",
    protein: "~122g", carbs: "~19g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Ginger & Soy Scrambled Eggs", desc:"Eggs scrambled gently with fresh grated ginger, a splash of soy sauce and sliced spring onions. Served with cucumber slices on the side.", tags:["chinese","protein"], macros:"~22g protein · ~2g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Marmite Beef Stir-fry", desc:"Thin-sliced beef strips stir-fried with Marmite, soy sauce, garlic and ginger over a bed of wilted pak choi. The Marmite adds an incredible depth of umami.", tags:["chinese","protein"], macros:"~38g protein · ~4g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Chinese-Style Chicken Curry", desc:"Chicken thighs in a golden Chinese curry sauce made with turmeric, Chinese five spice, ginger, garlic and chicken stock. No potatoes. Served with stir-fried cabbage and green beans.", tags:["chinese","protein","spicy"], macros:"~42g protein · ~7g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Hard Boiled Eggs with Chilli Oil", desc:"Two hard boiled eggs, halved and drizzled generously with chilli oil. A pinch of sea salt and toasted sesame seeds if you have them.", tags:["protein","spicy"], macros:"~12g protein · ~0g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 3", theme: "Midweek Mexican",
    tip: "Stuffed peppers are brilliant for meal prep — make double the filling and refrigerate for the next day's lunch.",
    protein: "~135g", carbs: "~21g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Chorizo & Egg Bake", desc:"Sliced chorizo baked in a cast iron pan with eggs cracked in, roasted cherry tomatoes and red peppers. Finished with strong Cheddar melted over the top.", tags:["mexican","protein","spicy"], macros:"~32g protein · ~5g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Mince Stuffed Peppers", desc:"Beef mince cooked with cumin, chilli, garlic and tomato paste, stuffed into halved peppers and baked with a thick strong Cheddar crust. No rice filling.", tags:["mexican","protein","spicy"], macros:"~38g protein · ~8g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Spicy Chicken Thigh Tray Bake", desc:"Bone-in chicken thighs rubbed with smoked paprika, cayenne, garlic powder and olive oil. Roasted alongside courgette, peppers and cherry tomatoes until the skin is crackling.", tags:["mexican","protein","spicy","veg"], macros:"~46g protein · ~6g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Marmite & Cheese Omelette Roll", desc:"A quick thin omelette spread with a scraping of Marmite and rolled around a thick slice of strong Cheddar. Ready in three minutes.", tags:["protein"], macros:"~18g protein · ~1g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 4", theme: "Chinese Thursday",
    tip: "Sichuan pepper gives a unique tingling numbness rather than heat. If you enjoy spice, it is well worth seeking out.",
    protein: "~126g", carbs: "~17g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Egg & Bacon with Marmite", desc:"Fried eggs and crispy back bacon. A small pot of Marmite on the side to dip the bacon into — a surprisingly addictive combination.", tags:["protein"], macros:"~28g protein · ~1g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Spicy Minced Pork Lettuce Cups", desc:"Pork mince stir-fried with garlic, ginger, chilli bean paste, soy sauce and sesame oil. Served in iceberg lettuce cups for scooping.", tags:["chinese","protein","spicy"], macros:"~36g protein · ~4g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Kung Pao Chicken", desc:"Diced chicken with dried chillies, Sichuan pepper, garlic, ginger and soy sauce. No peanuts, no rice. Served with stir-fried broccoli and green beans in oyster sauce.", tags:["chinese","protein","spicy"], macros:"~44g protein · ~7g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Strong Cheddar & Pickled Gherkins", desc:"Sharp mature Cheddar paired with tangy pickled gherkins. The acidity of the gherkins cuts through the richness of the cheese perfectly.", tags:["protein"], macros:"~10g protein · ~1g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 5", theme: "Fakeaway Friday",
    tip: "Friday is a great day to do your big protein hit at dinner — going into the weekend well-fuelled helps recovery after the week's training.",
    protein: "~132g", carbs: "~20g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Full English Minus the Toast", desc:"Bacon, fried eggs, grilled tomatoes, mushrooms and a good smear of Marmite on a side plate. All the pleasure, none of the bread.", tags:["protein","veg"], macros:"~35g protein · ~4g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Chilli Beef Salad Bowl", desc:"Thinly sliced beef with chilli, coriander, cucumber, radishes and a sesame and soy dressing. Cold, fresh and incredibly satisfying. No noodles.", tags:["chinese","protein","spicy"], macros:"~40g protein · ~5g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Chipotle Mince with Cauliflower Rice", desc:"Seasoned beef mince with chipotle paste, garlic, cumin and tinned tomatoes served over riced cauliflower. Topped with soured cream and a generous covering of strong Cheddar.", tags:["mexican","protein","spicy"], macros:"~48g protein · ~8g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Spiced Almonds & Seeds", desc:"Almonds, pumpkin seeds and sunflower seeds toasted in a dry pan with cumin, cayenne and a pinch of salt. A small handful is plenty.", tags:["spicy","protein"], macros:"~8g protein · ~4g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 6", theme: "Weekend Treat",
    tip: "Weekends are perfect for the slower cooks. The Chinese beef shin takes care of itself — just leave it simmering.",
    protein: "~150g", carbs: "~13g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Smoked Salmon & Cream Cheese Eggs", desc:"Eggs scrambled slowly with cream cheese, topped with smoked salmon, capers and plenty of black pepper. Feels like a treat and takes ten minutes.", tags:["protein"], macros:"~34g protein · ~2g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Cheese & Marmite Stuffed Chicken", desc:"Chicken breast butterflied and stuffed with strong Cheddar and a generous smear of Marmite, then wrapped tightly in streaky bacon and baked until golden and crispy.", tags:["protein"], macros:"~52g protein · ~1g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Slow-Cooked Chinese Beef Shin", desc:"Beef shin braised for three to four hours in soy sauce, star anise, ginger, garlic, chilli and a splash of rice wine. Falls apart. Served with wilted greens stir-fried in sesame oil.", tags:["chinese","protein","spicy"], macros:"~50g protein · ~5g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Cheese Board", desc:"Strong mature Cheddar, a hard aged cheese of your choosing, celery sticks, walnuts and a few green olives. Weekend cheese board — deserved.", tags:["protein"], macros:"~16g protein · ~2g carbs", pill:"pill-snack" }
    ]
  },
  {
    day: "Day 7", theme: "Sunday Reset",
    tip: "Sunday is a great day to batch cook — make extra mince and eggs to have ready for Monday morning. Sets the week up brilliantly.",
    protein: "~118g", carbs: "~26g", meals: "4",
    meals: [
      { type:"Breakfast", name:"Shakshuka-Style Baked Eggs", desc:"Eggs baked into a rich sauce of tinned tomatoes, peppers, cumin and smoked paprika. Topped with crumbled strong Cheddar and fresh herbs if you have them.", tags:["spicy","protein","veg"], macros:"~22g protein · ~8g carbs", pill:"pill-breakfast" },
      { type:"Lunch", name:"Roast Chicken Thighs with Roasted Veg", desc:"Skin-on chicken thighs roasted with courgette, aubergine, peppers and red onion. Seasoned simply with garlic, rosemary and olive oil. Let the oven do the work.", tags:["protein","veg"], macros:"~46g protein · ~9g carbs", pill:"pill-lunch" },
      { type:"Dinner", name:"Spicy Mince & Egg One-Pan Bake", desc:"Beef mince cooked with chilli, cumin and tomatoes in an oven-safe pan, then eggs cracked in and the whole thing finished in the oven. Strong Cheddar melted over the top.", tags:["mexican","protein","spicy"], macros:"~44g protein · ~6g carbs", pill:"pill-dinner" },
      { type:"Snack", name:"Marmite Beef Jerky Bites", desc:"Thin beef strips marinated in Marmite, soy sauce and cracked black pepper, then griddled until just crispy. An excellent high-protein end to the week.", tags:["protein"], macros:"~20g protein · ~1g carbs", pill:"pill-snack" }
    ]
  }
];

const tagLabels = { protein:"Protein", spicy:"Spicy", veg:"Veg", mexican:"Mexican", chinese:"Chinese" };

function showDay(i, btn) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const d = days[i];
  let html = `
    <div class="day-header">
      <div class="day-number">${d.day}</div>
      <div class="day-theme">${d.theme}</div>
    </div>
    <div class="tip-banner"><strong>Tip:</strong> ${d.tip}</div>
  `;
  d.meals.forEach(m => {
    const tagsHtml = m.tags.map(t => `<span class="meal-tag tag-${t}">${tagLabels[t]}</span>`).join('');
    html += `
      <div class="meal-block">
        <div class="meal-header">
          <span class="meal-type-pill ${m.pill}">${m.type}</span>
          <span class="meal-name">${m.name}</span>
        </div>
        <div class="meal-body">
          <p class="meal-desc">${m.desc}</p>
          <div class="meal-footer">
            ${tagsHtml}
            <span class="macro">${m.macros}</span>
          </div>
        </div>
      </div>
    `;
  });
  const totalProtein = d.meals.reduce((acc, m) => {
    const match = m.macros.match(/~(\d+)g protein/);
    return acc + (match ? parseInt(match[1]) : 0);
  }, 0);
  const totalCarbs = d.meals.reduce((acc, m) => {
    const match = m.macros.match(/~(\d+)g carbs/);
    return acc + (match ? parseInt(match[1]) : 0);
  }, 0);
  html += `
    <div class="nutrition-bar">
      <div><div class="val">~${totalProtein}g</div><div class="lbl">Protein</div></div>
      <div><div class="val">~${totalCarbs}g</div><div class="lbl">Net Carbs</div></div>
      <div><div class="val">4</div><div class="lbl">Meals</div></div>
    </div>
  `;
  document.getElementById('mainContent').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

showDay(0, document.querySelector('.day-btn'));
</script>
</body>
</html>
